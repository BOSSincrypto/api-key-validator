name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        env:
          # Relative base works for custom domain root AND github.io project path.
          VITE_BASE_PATH: "./"
          # Flip to "true" after DNS: api-key-validator CNAME → bossincrypto.github.io
          ENABLE_CUSTOM_DOMAIN: "false"
        run: |
          echo "VITE_BASE_PATH=${VITE_BASE_PATH}"
          bun run build
          echo "--- dist/index.html ---"
          cat dist/index.html

      - name: SPA fallback + nojekyll
        env:
          ENABLE_CUSTOM_DOMAIN: "false"
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll
          # Publish CNAME only after DNS points at GitHub Pages.
          if [ "${ENABLE_CUSTOM_DOMAIN}" = "true" ]; then
            printf '%s\n' 'api-key-validator.bossincrypto.dev' > dist/CNAME
            echo "CNAME enabled"
            cat dist/CNAME
          else
            rm -f dist/CNAME
            echo "CNAME deferred (set ENABLE_CUSTOM_DOMAIN=true after DNS)"
          fi
          ls -la dist

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
