name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        env:
          # Custom domain api-key-validator.bossincrypto.dev is served from site root.
          VITE_BASE_PATH: "/"
        run: |
          echo "VITE_BASE_PATH=${VITE_BASE_PATH}"
          bun run build
          echo "--- dist/index.html ---"
          cat dist/index.html

      - name: SPA fallback + nojekyll
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll
          printf '%s\n' 'api-key-validator.bossincrypto.dev' > dist/CNAME
          ls -la dist
          cat dist/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
